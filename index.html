<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzGit - 我的 GitHub 精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .repo-card { transition: all 0.2s; }
        .repo-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="white" class="w-6 h-6">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">EzGit</h1>
                        <p class="text-xs text-gray-500">我的 GitHub 精选</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="exportData()" class="px-3 py-2 text-sm text-gray-600 hover:text-primary transition" title="导出数据">
                        <i class="fas fa-download"></i>
                    </button>
                    <label class="px-3 py-2 text-sm text-gray-600 hover:text-primary transition cursor-pointer" title="导入数据">
                        <i class="fas fa-upload"></i>
                        <input type="file" accept=".json" class="hidden" onchange="importData(this)">
                    </label>
                    <button onclick="showAddModal()" class="bg-primary text-white px-4 py-2 rounded-lg text-sm">
                        <i class="fas fa-plus mr-1"></i>添加
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- Search -->
        <div class="mb-6">
            <input type="text" id="search" placeholder="搜索仓库..." 
                class="w-full px-4 py-2 border rounded-lg"
                oninput="renderRepos()">
        </div>

        <!-- Repo List -->
        <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- 动态渲染 -->
        </div>

        <!-- Empty -->
        <div id="empty" class="hidden text-center py-12">
            <p class="text-gray-500">还没有仓库，添加一个吧</p>
        </div>
    </main>

    <!-- Add Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md p-6">
            <h3 class="text-lg font-bold mb-4">添加仓库</h3>
            
            <input type="text" id="url" placeholder="https://github.com/user/repo" 
                class="w-full px-3 py-2 border rounded-lg mb-3"
                onblur="fetchInfo()">
            
            <input type="text" id="title" placeholder="一句话评价（可选）" 
                class="w-full px-3 py-2 border rounded-lg mb-3">
            
            <textarea id="notes" placeholder="详细笔记（可选）" rows="2"
                class="w-full px-3 py-2 border rounded-lg mb-4 resize-none"></textarea>
            
            <div class="flex gap-3">
                <button onclick="hideModal()" class="flex-1 py-2 border rounded-lg">取消</button>
                <button onclick="addRepo()" class="flex-1 py-2 bg-primary text-white rounded-lg">添加</button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let repos = JSON.parse(localStorage.getItem('ezgit') || '[]');

        // 渲染
        function renderRepos() {
            const search = document.getElementById('search').value.toLowerCase();
            const filtered = repos.filter(r => 
                r.url.toLowerCase().includes(search) ||
                (r.title || '').toLowerCase().includes(search)
            );
            
            const list = document.getElementById('repo-list');
            const empty = document.getElementById('empty');
            
            if (filtered.length === 0) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            list.innerHTML = filtered.map(r => `
                <div class="repo-card bg-white p-4 rounded-xl shadow-sm border cursor-pointer"
                     onclick="window.open('${r.url}', '_blank')">
                    <div class="flex items-start gap-3">
                        <img src="https://github.com/${r.owner}.png" class="w-10 h-10 rounded-lg"
                             onerror="this.src='https://github.com/github.png'">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-medium truncate">${r.owner}/${r.name}</h3>
                            ${r.title ? `<p class="text-sm text-gray-600 mt-1">${r.title}</p>` : ''}
                            ${r.notes ? `<p class="text-xs text-gray-400 mt-1">${r.notes}</p>` : ''}
                        </div>
                        <button onclick="event.stopPropagation(); deleteRepo('${r.id}')" 
                                class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // 添加
        function addRepo() {
            const url = document.getElementById('url').value.trim();
            if (!url) return;
            
            const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (!match) {
                alert('无效的 GitHub URL');
                return;
            }
            
            const repo = {
                id: Date.now().toString(),
                url: url.replace(/\.git$/, ''),
                owner: match[1],
                name: match[2].replace(/\.git$/, ''),
                title: document.getElementById('title').value.trim(),
                notes: document.getElementById('notes').value.trim(),
                addedAt: new Date().toISOString()
            };
            
            repos.unshift(repo);
            saveRepos();
            renderRepos();
            hideModal();
        }

        // 删除
        function deleteRepo(id) {
            if (!confirm('删除?')) return;
            repos = repos.filter(r => r.id !== id);
            saveRepos();
            renderRepos();
        }

        // 保存
        function saveRepos() {
            localStorage.setItem('ezgit', JSON.stringify(repos));
        }

        // 导出
        function exportData() {
            const blob = new Blob([JSON.stringify(repos, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ezgit-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导入
        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        repos = [...data, ...repos];
                        saveRepos();
                        renderRepos();
                        alert(`导入了 ${data.length} 个仓库`);
                    }
                } catch (err) {
                    alert('导入失败');
                }
            };
            reader.readAsText(file);
        }

        // 自动获取信息
        async function fetchInfo() {
            const url = document.getElementById('url').value;
            // 可选：调用 GitHub API 获取仓库信息
        }

        // Modal
        function showAddModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('url').value = '';
            document.getElementById('title').value = '';
            document.getElementById('notes').value = '';
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // 初始化
        renderRepos();
    </script>
</body>
</html>
