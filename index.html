        * { scrollbar-width: none; -ms-overflow-style: none; }

</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header -->

        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">

                    <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="white" class="w-6 h-6">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">EzGit</h1>
                        <p class="text-xs text-gray-500">我的 GitHub 精选仓库</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="搜索仓库..." 
                            class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 w-48">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    </div>
                    
                    <!-- 导入导出 -->
                    <button id="export-btn" class="w-9 h-9 flex items-center justify-center text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-lg transition" title="导出数据">
                        <i class="fas fa-download"></i>
                    </button>
                    <label class="w-9 h-9 flex items-center justify-center text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-lg transition cursor-pointer" title="导入数据">
                        <i class="fas fa-upload"></i>
                        <input type="file" id="import-file" accept=".json" class="hidden">
                    </label>
                    
                    <button id="add-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition text-sm">
                        <i class="fas fa-plus"></i>
                        <span>添加</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content flex-1">
        <!-- Stats Hero -->
        <section class="bg-gray-900 text-white py-6">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex items-center gap-8">
                    <div>
                        <p class="text-gray-400 text-sm">仓库总数</p>
                        <p id="total-count" class="text-3xl font-bold">0</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">分类数量</p>
                        <p id="category-count" class="text-3xl font-bold">0</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">精选</p>
                        <p id="starred-count" class="text-3xl font-bold">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section class="max-w-6xl mx-auto px-4 py-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap gap-2" id="category-filters">
                    <button data-category="all" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-green-600 text-white">
                        <i class="fas fa-th-large mr-1"></i> 全部
                    </button>
                    <button data-category="tools" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-wrench mr-1"></i> 效率工具
                    </button>
                    <button data-category="learning" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-graduation-cap mr-1"></i> 学习资源
                    </button>
                    <button data-category="inspiration" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-lightbulb mr-1"></i> 参考灵感
                    </button>
                    <button data-category="infrastructure" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-cubes mr-1"></i> 基础建设
                    </button>
                </div>
                
                <!-- View Toggle & Starred Filter -->
                <div class="flex items-center gap-2">
                    <button id="filter-starred" class="px-3 py-1.5 rounded-md text-sm text-gray-500 hover:text-yellow-500 transition flex items-center gap-1" title="只看精选">
                        <i class="far fa-star"></i> 精选 <span id="starred-count-badge" class="bg-gray-200 text-gray-600 text-xs px-1.5 py-0.5 rounded-full"></span>
                    </button>
                    <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
                        <button id="view-grid" class="view-btn px-3 py-1.5 rounded-md text-sm bg-white shadow">
                            <i class="fas fa-th-large"></i>
                        </button>
                        <button id="view-list" class="view-btn px-3 py-1.5 rounded-md text-sm text-gray-500">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Repo List -->
        <section class="max-w-6xl mx-auto px-4 pb-8">
            <div id="repo-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            
            <div id="empty-state" class="hidden text-center py-16">
                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-inbox text-4xl text-gray-400"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-900 mb-2">还没有收藏的仓库</h3>
                <p class="text-gray-500 mb-4">添加你发现的有价值的 GitHub 项目</p>
            </div>
        </section>
    </div>

        <div class="max-w-6xl mx-auto px-4 py-8">
            <!-- Top Section -->

                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="white" class="w-6 h-6">

                        </svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">EzGit</h3>
                        <p class="text-gray-400 text-sm">管理和发现有价值的 GitHub 仓库</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <a href="https://github.com/keepwonder/ezgit" target="_blank" class="text-gray-400 hover:text-white transition">GitHub</a>
                    <a href="https://github.com/keepwonder/ezgit/issues" target="_blank" class="text-gray-400 hover:text-white transition">反馈问题</a>
                    <a href="https://keepwonder.top" target="_blank" class="text-gray-400 hover:text-white transition">更多项目</a>

                <p class="text-center text-gray-500 text-sm">
                    Made with <i class="fas fa-heart text-red-500 mx-1"></i> by <a href="https://keepwonder.top" target="_blank" class="text-gray-400 hover:text-white transition">Kiang</a> · MIT License
                </p>
            </div>
        </div>
    </footer>

    <!-- Add Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl max-h-[85vh] overflow-y-auto">
            <div class="px-5 py-4 border-b flex items-center justify-between">
                <h3 class="text-lg font-bold text-gray-900">添加仓库</h3>
                <button id="close-modal" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="px-5 py-4">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">GitHub URL <span class="text-red-500">*</span></label>
                    <div class="flex gap-2">
                        <input type="text" id="repo-url" placeholder="https://github.com/user/repo" 
                            class="flex-1 px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                            onblur="window.fetchRepoInfo&&window.fetchRepoInfo()">
                        <button id="fetch-btn" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div id="repo-preview" class="hidden mb-3 bg-gray-50 rounded-lg p-3 border">
                    <div class="flex items-center gap-3">
                        <img id="preview-avatar" src="" class="w-9 h-9 rounded-lg bg-white">
                        <div class="flex-1 min-w-0">
                            <p id="preview-name" class="font-medium text-sm truncate"></p>
                            <p id="preview-desc" class="text-xs text-gray-500 truncate"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 mt-2 text-xs text-gray-400">
                        <span><i class="fas fa-star text-yellow-400 mr-1"></i><span id="preview-stars"></span></span>
                        <span><i class="fas fa-code mr-1"></i><span id="preview-lang"></span></span>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">分类 <span class="text-red-500">*</span></label>
                    <select id="repo-category" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">选择分类...</option>
                        <option value="tools">🔧 效率工具</option>
                        <option value="learning">📚 学习资源</option>
                        <option value="inspiration">💡 参考灵感</option>
                        <option value="infrastructure">📦 基础建设</option>
                    </select>
                    <div id="custom-category-input" class="hidden mt-2">
                        <div class="flex gap-2">
                            <input type="text" id="new-category-name" placeholder="分类名称" class="flex-1 px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            <button id="save-category-btn" class="px-3 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">添加</button>
                            <button id="cancel-category-btn" class="px-3 py-2 bg-gray-100 text-gray-600 text-sm rounded-lg hover:bg-gray-200">取消</button>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">一句话评价</label>
                    <input type="text" id="repo-title" placeholder="为什么推荐这个仓库？" 
                        class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">详细笔记</label>
                    <textarea id="repo-notes" placeholder="更多想法..." rows="3"
                        class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
                </div>
                
                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="repo-starred" class="w-4 h-4 text-green-600 rounded">
                    <label for="repo-starred" class="text-sm text-gray-700">标记为精选</label>
                </div>
                
                <div class="flex gap-3">
                    <button id="cancel-btn" class="flex-1 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                    <button id="save-btn" class="flex-1 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">添加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom Confirm Dialog -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-sm shadow-2xl p-6">
            <h3 class="text-lg font-bold text-gray-900 mb-2">确认操作</h3>
            <p id="confirm-message" class="text-gray-600 mb-6"></p>
            <div class="flex gap-3">
                <button id="confirm-cancel" class="flex-1 py-2 border rounded-lg hover:bg-gray-50 transition">取消</button>
                <button id="confirm-ok" class="flex-1 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 z-50 transition-all duration-300 transform translate-y-2 opacity-0">
        <div class="bg-gray-900 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 min-w-[280px]">
            <div id="toast-icon" class="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-info text-sm"></i>
            </div>
            <div class="flex-1">
                <p id="toast-message" class="text-sm font-medium"></p>
            </div>
            <button onclick="hideToast()" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <script>
        // 示例数据
        const sampleRepos = [
            {
                id: '1',
                url: 'https://github.com/dongbeixiaohuo/writing-agent',
                owner: 'dongbeixiaohuo',
                name: 'writing-agent',
                description: '🚀 基于 Claude Code 的去AI味写作系统',
                language: 'Markdown',
                stars: '2.1k',
                category: 'ai',
                title: 'AI写作工作流，反AI味设计值得借鉴',
                notes: 'Skills + Subagents 架构很棒',
                starred: true,
                addedAt: '2026-03-02'
            }
        ];

        let repos = JSON.parse(localStorage.getItem('ezgit-repos') || JSON.stringify(sampleRepos));
        let currentCategory = 'all';
        let currentView = localStorage.getItem('ezgit-view') || 'grid';
        let editingRepoId = null;
        let showOnlyStarred = false; // 是否只看精选 // 当前正在编辑的仓库ID

        // 加载自定义分类
        let customCategories = JSON.parse(localStorage.getItem('ezgit-categories') || '{}');
        
        const defaultCategoryNames = {
            tools: '效率工具',
            learning: '学习资源',
            inspiration: '参考灵感',
            infrastructure: '基础建设'
        };
        
        // 合并默认和自定义分类
        let categoryNames = { ...defaultCategoryNames, ...customCategories };

        // DOM 元素
        const repoList = document.getElementById('repo-list');
        const emptyState = document.getElementById('empty-state');
        const addModal = document.getElementById('add-modal');
        const toast = document.getElementById('toast');

        // 渲染分类筛选按钮
        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');
            const allBtn = container.querySelector('[data-category="all"]');
            
            // 清除现有分类按钮（保留"全部"按钮）
            container.querySelectorAll('.filter-btn:not([data-category="all"])').forEach(btn => btn.remove());
            container.querySelectorAll('.category-wrapper').forEach(wrapper => wrapper.remove());
            
            // 添加所有分类按钮
            Object.entries(categoryNames).forEach(([key, name]) => {
                const isCustom = customCategories[key]; // 是否是自定义分类
                const isActive = currentCategory === key;
                
                if (isCustom) {
                    // 自定义分类：使用 wrapper 包含按钮和删除图标
                    const wrapper = document.createElement('div');
                    wrapper.className = 'category-wrapper relative group';
                    
                    const btn = document.createElement('button');
                    btn.className = `filter-btn px-4 py-2 rounded-full text-sm font-medium transition border pr-8 ${isActive ? 'bg-green-600 text-white border-green-600' : 'bg-white text-gray-600 border-gray-200'}`;
                    btn.dataset.category = key;
                    btn.innerHTML = `<i class="fas fa-tag mr-1"></i> ${name}`;
                    btn.onclick = () => filterByCategory(key);
                    
                    // 删除按钮
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'absolute right-1 top-1/2 -translate-y-1/2 w-6 h-6 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full opacity-0 group-hover:opacity-100 transition';
                    deleteBtn.innerHTML = '<i class="fas fa-times text-xs"></i>';
                    deleteBtn.title = '删除分类';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteCustomCategory(key, name);
                    };
                    
                    wrapper.appendChild(btn);
                    wrapper.appendChild(deleteBtn);
                    container.appendChild(wrapper);
                } else {
                    // 默认分类：普通按钮
                    const btn = document.createElement('button');
                    btn.className = `filter-btn px-4 py-2 rounded-full text-sm font-medium transition border ${isActive ? 'bg-green-600 text-white border-green-600' : 'bg-white text-gray-600 border-gray-200'}`;
                    btn.dataset.category = key;
                    btn.innerHTML = `<i class="fas fa-tag mr-1"></i> ${name}`;
                    btn.onclick = () => filterByCategory(key);
                    container.appendChild(btn);
                }
            });
        }

        // 删除自定义分类
        function deleteCustomCategory(key, name) {
            // 检查该分类下是否有仓库
            const reposInCategory = repos.filter(r => r.category === key);
            
            if (reposInCategory.length > 0) {
                // 有仓库，提示用户
                showToast(`该分类下有 ${reposInCategory.length} 个仓库，请先移动或删除`, 'warning');
                return;
            }
            
            // 使用自定义确认对话框
            showConfirm(`确定要删除分类"${name}"吗？`, () => {
                // 从自定义分类中删除
                delete customCategories[key];
                delete categoryNames[key];
                
                // 保存到 localStorage
                localStorage.setItem('ezgit-categories', JSON.stringify(customCategories));
                
                // 如果当前选中的是被删除的分类，重置为全部
                if (currentCategory === key) {
                    currentCategory = 'all';
                }
                
                // 更新UI
                renderCategoryFilters();
                updateCategorySelect();
                updateStats();
                render();
                
                showToast('分类已删除', 'success');
            });
        }

        // 更新分类下拉框
        function updateCategorySelect() {
            const select = document.getElementById('repo-category');
            const currentValue = select.value;
            
            // 保留第一个option，重新生成其他选项
            select.innerHTML = '<option value="">选择分类...</option>';
            
            Object.entries(categoryNames).forEach(([key, name]) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = name;
                select.appendChild(option);
            });
            
            // 添加"+ 添加自定义分类"选项
            const addOption = document.createElement('option');
            addOption.value = '__add_new__';
            addOption.textContent = '+ 添加自定义分类';
            select.appendChild(addOption);

        // 添加自定义分类
        function addCustomCategory() {
            const input = document.getElementById('new-category-name');
            const name = input.value.trim();
            
            if (!name) {
                showToast('请输入分类名称', 'error');
                return;
            }
            
            // 生成唯一key
            const key = 'custom_' + Date.now();
            customCategories[key] = name;
            categoryNames[key] = name;
            
            // 保存到localStorage
            localStorage.setItem('ezgit-categories', JSON.stringify(customCategories));
            
            // 更新UI
            renderCategoryFilters();
            updateCategorySelect();
            
            // 选中新添加的分类
            document.getElementById('repo-category').value = key;

        // 自定义确认对话框
        let confirmCallback = null;
        
        function showConfirm(message, onConfirm, onCancel) {
            const modal = document.getElementById('confirm-modal');
            const messageEl = document.getElementById('confirm-message');
            const okBtn = document.getElementById('confirm-ok');
            const cancelBtn = document.getElementById('confirm-cancel');
            
            messageEl.textContent = message;
            confirmCallback = onConfirm;
            
            modal.classList.remove('hidden');
            
            // 绑定一次性事件
            const handleOk = () => {
                modal.classList.add('hidden');
                if (onConfirm) onConfirm();
                cleanup();
            };
            
            const handleCancel = () => {
                modal.classList.add('hidden');
                if (onCancel) onCancel();
                cleanup();
            };
            
            const cleanup = () => {
                okBtn.removeEventListener('click', handleOk);
                cancelBtn.removeEventListener('click', handleCancel);
                modal.removeEventListener('click', handleOutsideClick);
            };
            
            const handleOutsideClick = (e) => {
                if (e.target === modal) {
                    handleCancel();
                }
            };
            
            okBtn.addEventListener('click', handleOk);
            cancelBtn.addEventListener('click', handleCancel);
            modal.addEventListener('click', handleOutsideClick);
        }

        // 更新统计
        function updateStats() {
            document.getElementById('total-count').textContent = repos.length;
            const categories = new Set(repos.map(r => r.category).filter(Boolean));
            document.getElementById('category-count').textContent = categories.size;
            const starredCount = repos.filter(r => r.starred).length;
            document.getElementById('starred-count').textContent = starredCount;
            
            // 更新精选按钮上的数量
            const badge = document.getElementById('starred-count-badge');
            if (badge) {
                badge.textContent = starredCount;
                // 如果有精选，显示黄色背景
                if (starredCount > 0) {
                    badge.classList.remove('bg-gray-200', 'text-gray-600');
                    badge.classList.add('bg-yellow-100', 'text-yellow-600');
                } else {
                    badge.classList.remove('bg-yellow-100', 'text-yellow-600');
                    badge.classList.add('bg-gray-200', 'text-gray-600');
                }
            }
        }

            localStorage.setItem('ezgit-repos', JSON.stringify(repos));
        }

        // 显示提示
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const iconEl = document.getElementById('toast-icon');
            const msgEl = document.getElementById('toast-message');
            
            // 设置图标
            const icons = {
                success: '<i class="fas fa-check text-green-400"></i>',
                error: '<i class="fas fa-exclamation text-red-400"></i>',
                warning: '<i class="fas fa-exclamation-triangle text-yellow-400"></i>',
                info: '<i class="fas fa-info text-blue-400"></i>'
            };
            
            // 设置背景色
            const bgColors = {
                success: 'bg-green-900/90',
                error: 'bg-red-900/90',
                warning: 'bg-yellow-900/90',
                info: 'bg-gray-900/90'
            };
            
            iconEl.innerHTML = icons[type] || icons.info;
            msgEl.textContent = msg;
            
            // 显示动画
            toast.classList.remove('hidden');
            toast.classList.remove('translate-y-2', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            // 自动隐藏
            setTimeout(() => {
                hideToast();
            }, 3000);
        }
        
        // 隐藏提示
        function hideToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('translate-y-2', 'opacity-0');
            toast.classList.remove('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 300);
        }

        // 添加/更新仓库
        function addRepo() {
            const url = document.getElementById('repo-url').value.trim();
            const category = document.getElementById('repo-category').value;
            const title = document.getElementById('repo-title').value.trim();
            const notes = document.getElementById('repo-notes').value.trim();
            const starred = document.getElementById('repo-starred').checked;
            
            if (!url || !category) {
                showToast('请填写 URL 和分类', 'warning');
                return;
            }
            
            // 编辑模式
            if (editingRepoId) {
                const repo = repos.find(r => r.id === editingRepoId);
                if (repo) {
                    repo.category = category;
                    repo.title = title;
                    repo.notes = notes;
                    repo.starred = starred;
                    // 从预览区域获取 GitHub API 数据
                    repo.description = document.getElementById('preview-desc').textContent || '';
                    repo.language = document.getElementById('preview-lang').textContent || '';
                    repo.stars = document.getElementById('preview-stars').textContent || '';
                    
                    saveRepos();
                    updateStats();
                    render();
                    addModal.classList.add('hidden');
                    showToast('已更新', 'success');
                    
                    // 重置编辑模式
                    editingRepoId = null;
                    document.getElementById('save-btn').textContent = '添加';
                    resetForm();
                }
                return;
            }
            
            // 添加模式
            const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (!match) {
                showToast('无效的 GitHub URL', 'error');
                return;
            }
            
            repos.unshift({
                id: Date.now().toString(),
                url: url.replace(/\.git$/, ''),
                owner: match[1],
                name: match[2].replace(/\.git$/, ''),
                description: document.getElementById('preview-desc').textContent || '',
                language: document.getElementById('preview-lang').textContent || '',
                stars: document.getElementById('preview-stars').textContent || '',
                category,
                title,
                notes,
                starred,
                addedAt: new Date().toISOString()
            });
            
            saveRepos();
            updateStats();
            render();
            addModal.classList.add('hidden');
            showToast('仓库已添加', 'success');
            
            // 清空表单
            resetForm();
        }

        // 获取仓库信息
        async function fetchRepoInfo() {
            const url = document.getElementById('repo-url').value.trim();
            if (!url) return;
            
            const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (!match) return;
            
            const [, owner, name] = match;
            const cleanName = name.replace(/\.git$/, '');
            
            // 显示基础信息（头像和名称）
            document.getElementById('preview-avatar').src = `https://github.com/${owner}.png`;
            document.getElementById('preview-name').textContent = `${owner}/${cleanName}`;
            document.getElementById('repo-preview').classList.remove('hidden');
            
            try {
                // 调用 GitHub API
                const response = await fetch(`https://api.github.com/repos/${owner}/${cleanName}`);
                
                if (!response.ok) {
                    // 获取失败，静默跳过，显示默认信息
                    document.getElementById('preview-desc').textContent = '';
                    document.getElementById('preview-stars').textContent = '';
                    document.getElementById('preview-lang').textContent = '';
                    return;
                }
                
                const data = await response.json();
                
                // 填充获取到的信息
                document.getElementById('preview-desc').textContent = data.description || '';
                document.getElementById('preview-stars').textContent = data.stargazers_count ? formatStars(data.stargazers_count) : '';
                document.getElementById('preview-lang').textContent = data.language || '';
                
            } catch (error) {
                // 网络错误或其他异常，静默跳过
                document.getElementById('preview-desc').textContent = '';
                document.getElementById('preview-stars').textContent = '';
                document.getElementById('preview-lang').textContent = '';
            }
        }
        
        // 格式化 stars 数量
        function formatStars(count) {
            if (count >= 1000) {
                return (count / 1000).toFixed(1) + 'k';
            }
            return count.toString();
        }

        // 编辑仓库
        function editRepo(id) {
            const repo = repos.find(r => r.id === id);
            if (!repo) return;
            
            editingRepoId = id; // 设置编辑模式
            document.getElementById('repo-url').value = repo.url;
            document.getElementById('repo-category').value = repo.category;
            document.getElementById('repo-title').value = repo.title || '';
            document.getElementById('repo-notes').value = repo.notes || '';
            document.getElementById('repo-starred').checked = repo.starred;
            
            fetchRepoInfo();
            addModal.classList.remove('hidden');
            
            // 修改按钮文字为更新
            document.getElementById('save-btn').textContent = '更新';
        }

        // 切换精选
        function toggleStar(id) {
            const repo = repos.find(r => r.id === id);
            if (!repo) return;
            
            repo.starred = !repo.starred;
            saveRepos();
            updateStats();
            render();
            showToast(repo.starred ? '已标记为精选' : '已取消精选');
        }

        // 删除仓库
        function deleteRepo(id) {
            showConfirm('确定要删除这个仓库吗？', () => {
                repos = repos.filter(r => r.id !== id);
                saveRepos();
                updateStats();
                render();
                showToast('已删除', 'success');
            });
        }

        // 重置表单
        function resetForm() {
            document.getElementById('repo-url').value = '';
            document.getElementById('repo-category').value = '';
            document.getElementById('repo-title').value = '';
            document.getElementById('repo-notes').value = '';
            document.getElementById('repo-starred').checked = false;
            document.getElementById('repo-preview').classList.add('hidden');
            document.getElementById('custom-category-input').classList.add('hidden');
            document.getElementById('new-category-name').value = '';
        }

        // 导出数据
        function exportData() {
            const blob = new Blob([JSON.stringify(repos, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ezgit-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出', 'success');
        }

        // 导入数据
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        repos = [...data, ...repos];
                        saveRepos();
                        updateStats();
                        render();
                        showToast(`导入了 ${data.length} 个仓库`, 'success');
                    }
                } catch {
                    showToast('导入失败', 'error');
                }
            };
            reader.readAsText(file);
        }

        // 搜索
        function searchRepos() {
            render();
        }

        // 筛选分类
        function filterByCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.remove('bg-white', 'text-gray-600', 'border');
                    btn.classList.add('bg-green-600', 'text-white');
                } else {
                    btn.classList.add('bg-white', 'text-gray-600', 'border');
                    btn.classList.remove('bg-green-600', 'text-white');
                }
            });
            
            render();
        }

        // 切换精选筛选
        function toggleStarredFilter() {
            showOnlyStarred = !showOnlyStarred;
            
            const btn = document.getElementById('filter-starred');
            const starredCount = repos.filter(r => r.starred).length;
            
            if (showOnlyStarred) {
                btn.classList.remove('text-gray-500');
                btn.classList.add('text-yellow-500', 'bg-yellow-50');
                btn.innerHTML = `<i class="fas fa-star"></i> 精选 <span class="bg-yellow-200 text-yellow-700 text-xs px-1.5 py-0.5 rounded-full">${starredCount}</span>`;
            } else {
                btn.classList.remove('text-yellow-500', 'bg-yellow-50');
                btn.classList.add('text-gray-500');
                // 取消筛选时重新调用updateStats来更新正确的徽章样式
                updateStats();
            }
            
            render();
        }

            currentView = view;

            const gridBtn = document.getElementById('view-grid');
            const listBtn = document.getElementById('view-list');

                gridBtn.classList.add('bg-white', 'shadow');

        // 拖拽功能
        let draggedId = null;

        function initDragAndDrop() {
            const cards = document.querySelectorAll('.repo-card');
            
            cards.forEach(card => {
                card.addEventListener('dragstart', handleDragStart);
                card.addEventListener('dragend', handleDragEnd);
                card.addEventListener('dragover', handleDragOver);
                card.addEventListener('drop', handleDrop);
                card.addEventListener('dragenter', handleDragEnter);
                card.addEventListener('dragleave', handleDragLeave);
            });
        }

        function handleDragStart(e) {
            draggedId = this.dataset.id;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', draggedId);
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('.repo-card').forEach(card => {
                card.classList.remove('drag-over');
            });
            draggedId = null;
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDragEnter(e) {
            e.preventDefault();
            if (this.dataset.id !== draggedId) {
                this.classList.add('drag-over');
            }
        }

        function handleDragLeave(e) {
            this.classList.remove('drag-over');
        }

        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            
            const droppedId = this.dataset.id;
            if (draggedId === droppedId) return;
            
            // 找到拖拽的索引和目标索引
            const draggedIndex = repos.findIndex(r => r.id === draggedId);
            const droppedIndex = repos.findIndex(r => r.id === droppedId);
            
            if (draggedIndex === -1 || droppedIndex === -1) return;
            
            // 重新排序
            const [draggedRepo] = repos.splice(draggedIndex, 1);
            repos.splice(droppedIndex, 0, draggedRepo);
            
            // 保存并重新渲染
            saveRepos();
            render();
            showToast('已调整顺序', 'success');
        }

        // 点击遮罩关闭
        addModal.addEventListener('click', (e) => {
            if (e.target === addModal) hideAddModal();
        });

        // 初始化
        renderCategoryFilters();
        updateCategorySelect();
        updateStats();
        toggleView(currentView);
        render();
        initDragAndDrop();
    </script>
</body>
</html>
