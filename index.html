<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzGit - 我的 GitHub 精选</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .repo-card { transition: all 0.2s; }
        .repo-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="white" class="w-6 h-6">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold">EzGit</h1>
                        <p class="text-xs text-gray-500">我的 GitHub 精选</p>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button id="export-btn" class="px-3 py-2 text-gray-600 hover:text-green-600">
                        <i class="fas fa-download"></i>
                    </button>
                    <label class="px-3 py-2 text-gray-600 hover:text-green-600 cursor-pointer">
                        <i class="fas fa-upload"></i>
                        <input type="file" id="import-file" accept=".json" class="hidden">
                    </label>
                    <button id="add-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-plus"></i> 添加
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        <!-- Filter -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button class="filter-btn active px-4 py-2 rounded-full text-sm bg-green-600 text-white" data-filter="all">全部</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm bg-white border" data-filter="ai">AI & ML</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm bg-white border" data-filter="frontend">前端</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm bg-white border" data-filter="backend">后端</button>
            <button class="filter-btn px-4 py-2 rounded-full text-sm bg-white border" data-filter="tools">工具</button>
            
            <div class="flex-1"></div>
            
            <button id="view-grid-btn" class="view-btn px-3 py-2 rounded-lg bg-white shadow"><i class="fas fa-th-large"></i></button>
            <button id="view-list-btn" class="view-btn px-3 py-2 rounded-lg text-gray-500"><i class="fas fa-list"></i></button>
        </div>

        <!-- List -->
        <div id="repo-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        
        <div id="empty-msg" class="hidden text-center py-12 text-gray-500">还没有仓库</div>
    </main>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl w-full max-w-md p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold">添加仓库</h3>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="text" id="repo-url" placeholder="https://github.com/user/repo" 
                class="w-full px-3 py-2 border rounded-lg mb-3">
            
            <select id="repo-category" class="w-full px-3 py-2 border rounded-lg mb-3">
                <option value="">选择分类...</option>
                <option value="ai">AI & ML</option>
                <option value="frontend">前端</option>
                <option value="backend">后端</option>
                <option value="tools">工具</option>
            </select>
            
            <input type="text" id="repo-title" placeholder="一句话评价（可选）" 
                class="w-full px-3 py-2 border rounded-lg mb-4">
            
            <div class="flex gap-3">
                <button id="cancel-btn" class="flex-1 py-2 border rounded-lg">取消</button>
                <button id="save-btn" class="flex-1 py-2 bg-green-600 text-white rounded-lg">添加</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-4 py-2 rounded-lg"></div>

    <script>
        // 数据
        const sampleRepos = [
            {
                id: '1',
                url: 'https://github.com/dongbeixiaohuo/writing-agent',
                owner: 'dongbeixiaohuo',
                name: 'writing-agent',
                category: 'ai',
                title: 'AI写作工作流系统',
                addedAt: '2026-03-02'
            }
        ];

        let repos = JSON.parse(localStorage.getItem('ezgit') || JSON.stringify(sampleRepos));
        let currentFilter = 'all';
        let currentView = 'grid';

        // 获取DOM元素
        const repoList = document.getElementById('repo-list');
        const emptyMsg = document.getElementById('empty-msg');
        const modal = document.getElementById('modal');
        const toast = document.getElementById('toast');

        // 渲染
        function render() {
            let filtered = repos;
            if (currentFilter !== 'all') {
                filtered = repos.filter(r => r.category === currentFilter);
            }
            
            if (filtered.length === 0) {
                repoList.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                return;
            }
            
            emptyMsg.classList.add('hidden');
            
            // 设置网格/列表样式
            if (currentView === 'grid') {
                repoList.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4';
            } else {
                repoList.className = 'flex flex-col gap-3';
            }
            
            repoList.innerHTML = filtered.map(r => {
                if (currentView === 'grid') {
                    return `
                        <div class="repo-card bg-white p-4 rounded-xl shadow-sm border cursor-pointer" onclick="window.open('${r.url}', '_blank')">
                            <div class="flex items-start gap-3">
                                <img src="https://github.com/${r.owner}.png" class="w-10 h-10 rounded-lg" onerror="this.src='https://github.com/github.png'">
                                <div class="flex-1 min-w-0">
                                    <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">${r.category}</span>
                                    <h3 class="font-medium truncate mt-1">${r.owner}/${r.name}</h3>
                                    ${r.title ? `<p class="text-sm text-gray-600 mt-1">${r.title}</p>` : ''}
                                </div>
                                <button onclick="event.stopPropagation(); deleteRepo('${r.id}')" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="repo-card bg-white p-4 rounded-xl shadow-sm border cursor-pointer flex items-center gap-4" onclick="window.open('${r.url}', '_blank')">
                            <img src="https://github.com/${r.owner}.png" class="w-10 h-10 rounded-lg" onerror="this.src='https://github.com/github.png'">
                            <div class="flex-1 min-w-0">
                                <span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded">${r.category}</span>
                                <h3 class="font-medium truncate">${r.owner}/${r.name}</h3>
                            </div>
                            <button onclick="event.stopPropagation(); deleteRepo('${r.id}')" class="text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                }
            }).join('');
        }

        // 保存
        function save() {
            localStorage.setItem('ezgit', JSON.stringify(repos));
        }

        // 显示提示
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        // 添加
        function addRepo() {
            const url = document.getElementById('repo-url').value.trim();
            const category = document.getElementById('repo-category').value;
            const title = document.getElementById('repo-title').value.trim();
            
            if (!url || !category) {
                showToast('请填写URL和分类');
                return;
            }
            
            const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (!match) {
                showToast('无效的GitHub URL');
                return;
            }
            
            repos.unshift({
                id: Date.now().toString(),
                url: url.replace(/\.git$/, ''),
                owner: match[1],
                name: match[2].replace(/\.git$/, ''),
                category,
                title,
                addedAt: new Date().toISOString().split('T')[0]
            });
            
            save();
            render();
            modal.classList.add('hidden');
            showToast('已添加');
            
            // 清空表单
            document.getElementById('repo-url').value = '';
            document.getElementById('repo-category').value = '';
            document.getElementById('repo-title').value = '';
        }

        // 删除
        function deleteRepo(id) {
            if (!confirm('删除?')) return;
            repos = repos.filter(r => r.id !== id);
            save();
            render();
        }

        // 导出
        function exportData() {
            const blob = new Blob([JSON.stringify(repos, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ezgit-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导入
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        repos = [...data, ...repos];
                        save();
                        render();
                        showToast(`导入了${data.length}个`);
                    }
                } catch {
                    showToast('导入失败');
                }
            };
            reader.readAsText(file);
        }

        // 事件绑定
        document.getElementById('add-btn').addEventListener('click', () => {
            modal.classList.remove('hidden');
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        document.getElementById('cancel-btn').addEventListener('click', () => {
            modal.classList.add('hidden');
        });

        document.getElementById('save-btn').addEventListener('click', addRepo);

        document.getElementById('export-btn').addEventListener('click', exportData);

        document.getElementById('import-file').addEventListener('change', (e) => {
            if (e.target.files[0]) importData(e.target.files[0]);
        });

        // 筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('bg-green-600', 'text-white');
                    b.classList.add('bg-white');
                });
                btn.classList.remove('bg-white');
                btn.classList.add('bg-green-600', 'text-white');
                currentFilter = btn.dataset.filter;
                render();
            });
        });

        // 视图切换
        document.getElementById('view-grid-btn').addEventListener('click', () => {
            currentView = 'grid';
            document.getElementById('view-grid-btn').classList.add('bg-white', 'shadow');
            document.getElementById('view-grid-btn').classList.remove('text-gray-500');
            document.getElementById('view-list-btn').classList.remove('bg-white', 'shadow');
            document.getElementById('view-list-btn').classList.add('text-gray-500');
            render();
        });

        document.getElementById('view-list-btn').addEventListener('click', () => {
            currentView = 'list';
            document.getElementById('view-list-btn').classList.add('bg-white', 'shadow');
            document.getElementById('view-list-btn').classList.remove('text-gray-500');
            document.getElementById('view-grid-btn').classList.remove('bg-white', 'shadow');
            document.getElementById('view-grid-btn').classList.add('text-gray-500');
            render();
        });

        // 点击遮罩关闭
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.add('hidden');
        });

        // 初始化
        render();
    </script>
</body>
</html>
