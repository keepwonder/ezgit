<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EzGit - 我的 GitHub 精选仓库</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='%23059669' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { scrollbar-width: none; -ms-overflow-style: none; }
        *::-webkit-scrollbar { display: none; }
        .repo-card { transition: all 0.2s; }
        .repo-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .category-tag { transition: all 0.2s; }
        .category-tag:hover { transform: scale(1.05); }
        .main-content { min-height: calc(100vh - 280px); }
        html, body { overflow-x: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="white" class="w-6 h-6">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">EzGit</h1>
                        <p class="text-xs text-gray-500">我的 GitHub 精选仓库</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="搜索仓库..." 
                            class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-green-500 w-48">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    </div>
                    
                    <!-- 导入导出 -->
                    <button id="export-btn" class="w-9 h-9 flex items-center justify-center text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-lg transition" title="导出数据">
                        <i class="fas fa-download"></i>
                    </button>
                    <label class="w-9 h-9 flex items-center justify-center text-gray-500 hover:text-green-600 hover:bg-green-50 rounded-lg transition cursor-pointer" title="导入数据">
                        <i class="fas fa-upload"></i>
                        <input type="file" id="import-file" accept=".json" class="hidden">
                    </label>
                    
                    <button id="add-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 transition text-sm">
                        <i class="fas fa-plus"></i>
                        <span>添加</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content flex-1">
        <!-- Stats Hero -->
        <section class="bg-gray-900 text-white py-6">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex items-center gap-8">
                    <div>
                        <p class="text-gray-400 text-sm">仓库总数</p>
                        <p id="total-count" class="text-3xl font-bold">0</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">分类数量</p>
                        <p id="category-count" class="text-3xl font-bold">0</p>
                    </div>
                    <div>
                        <p class="text-gray-400 text-sm">精选</p>
                        <p id="starred-count" class="text-3xl font-bold">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Categories -->
        <section class="max-w-6xl mx-auto px-4 py-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex flex-wrap gap-2" id="category-filters">
                    <button data-category="all" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-green-600 text-white">
                        <i class="fas fa-th-large mr-1"></i> 全部
                    </button>
                    <button data-category="tools" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-wrench mr-1"></i> 效率工具
                    </button>
                    <button data-category="learning" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-graduation-cap mr-1"></i> 学习资源
                    </button>
                    <button data-category="inspiration" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-lightbulb mr-1"></i> 参考灵感
                    </button>
                    <button data-category="infrastructure" class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-white text-gray-600 border border-gray-200">
                        <i class="fas fa-cubes mr-1"></i> 基础建设
                    </button>
                    <button id="add-category-btn" class="px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-500 border border-dashed border-gray-300 hover:bg-gray-200 hover:text-gray-700 transition">
                        <i class="fas fa-plus mr-1"></i> 添加分类
                    </button>
                </div>
                
                <!-- View Toggle -->
                <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
                    <button id="view-grid" class="view-btn px-3 py-1.5 rounded-md text-sm bg-white shadow">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <button id="view-list" class="view-btn px-3 py-1.5 rounded-md text-sm text-gray-500">
                        <i class="fas fa-list"></i>
                    </button>
                </div>
            </div>
        </section>

        <!-- Repo List -->
        <section class="max-w-6xl mx-auto px-4 pb-8">
            <div id="repo-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
            
            <div id="empty-state" class="hidden text-center py-16">
                <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-inbox text-4xl text-gray-400"></i>
                </div>
                <h3 class="text-lg font-medium text-gray-900 mb-2">还没有收藏的仓库</h3>
                <p class="text-gray-500 mb-4">添加你发现的有价值的 GitHub 项目</p>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white mt-auto">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <!-- Top Section -->
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-600 rounded-lg flex items-center justify-center">
                        <svg viewBox="0 0 24 24" fill="white" class="w-6 h-6">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">EzGit</h3>
                        <p class="text-gray-400 text-sm">管理和发现有价值的 GitHub 仓库</p>
                    </div>
                </div>
                <div class="flex items-center gap-6">
                    <a href="https://github.com/keepwonder/ezgit" target="_blank" class="text-gray-400 hover:text-white transition">GitHub</a>
                    <a href="https://github.com/keepwonder/ezgit/issues" target="_blank" class="text-gray-400 hover:text-white transition">反馈问题</a>
                    <a href="https://keepwonder.top" target="_blank" class="text-gray-400 hover:text-white transition">更多项目</a>
                </div>
            </div>
            
            <!-- Divider -->
            <div class="border-t border-gray-800 pt-4">
                <p class="text-center text-gray-500 text-sm">
                    Made with <i class="fas fa-heart text-red-500 mx-1"></i> by <a href="https://keepwonder.top" target="_blank" class="text-gray-400 hover:text-white transition">Kiang</a> · MIT License
                </p>
            </div>
        </div>
    </footer>

    <!-- Add Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl max-h-[85vh] overflow-y-auto">
            <div class="px-5 py-4 border-b flex items-center justify-between">
                <h3 class="text-lg font-bold text-gray-900">添加仓库</h3>
                <button id="close-modal" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="px-5 py-4">
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">GitHub URL <span class="text-red-500">*</span></label>
                    <div class="flex gap-2">
                        <input type="text" id="repo-url" placeholder="https://github.com/user/repo" 
                            class="flex-1 px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                            onblur="window.fetchRepoInfo&&window.fetchRepoInfo()">
                        <button id="fetch-btn" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                
                <div id="repo-preview" class="hidden mb-3 bg-gray-50 rounded-lg p-3 border">
                    <div class="flex items-center gap-3">
                        <img id="preview-avatar" src="" class="w-9 h-9 rounded-lg bg-white">
                        <div class="flex-1 min-w-0">
                            <p id="preview-name" class="font-medium text-sm truncate"></p>
                            <p id="preview-desc" class="text-xs text-gray-500 truncate"></p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 mt-2 text-xs text-gray-400">
                        <span><i class="fas fa-star text-yellow-400 mr-1"></i><span id="preview-stars"></span></span>
                        <span><i class="fas fa-code mr-1"></i><span id="preview-lang"></span></span>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">分类 <span class="text-red-500">*</span></label>
                    <select id="repo-category" class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        <option value="">选择分类...</option>
                        <option value="tools">🔧 效率工具</option>
                        <option value="learning">📚 学习资源</option>
                        <option value="inspiration">💡 参考灵感</option>
                        <option value="infrastructure">📦 基础建设</option>
                    </select>
                    <div id="custom-category-input" class="hidden mt-2">
                        <div class="flex gap-2">
                            <input type="text" id="new-category-name" placeholder="分类名称" class="flex-1 px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            <button id="save-category-btn" class="px-3 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700">添加</button>
                            <button id="cancel-category-btn" class="px-3 py-2 bg-gray-100 text-gray-600 text-sm rounded-lg hover:bg-gray-200">取消</button>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">一句话评价</label>
                    <input type="text" id="repo-title" placeholder="为什么推荐这个仓库？" 
                        class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">详细笔记</label>
                    <textarea id="repo-notes" placeholder="更多想法..." rows="3"
                        class="w-full px-3 py-2 text-sm border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
                </div>
                
                <div class="flex items-center gap-2 mb-4">
                    <input type="checkbox" id="repo-starred" class="w-4 h-4 text-green-600 rounded">
                    <label for="repo-starred" class="text-sm text-gray-700">标记为精选</label>
                </div>
                
                <div class="flex gap-3">
                    <button id="cancel-btn" class="flex-1 py-2 border rounded-lg hover:bg-gray-50">取消</button>
                    <button id="save-btn" class="flex-1 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">添加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-gray-900 text-white px-4 py-2 rounded-lg z-50"></div>

    <script>
        // 示例数据
        const sampleRepos = [
            {
                id: '1',
                url: 'https://github.com/dongbeixiaohuo/writing-agent',
                owner: 'dongbeixiaohuo',
                name: 'writing-agent',
                description: '🚀 基于 Claude Code 的去AI味写作系统',
                language: 'Markdown',
                stars: '2.1k',
                category: 'ai',
                title: 'AI写作工作流，反AI味设计值得借鉴',
                notes: 'Skills + Subagents 架构很棒',
                starred: true,
                addedAt: '2026-03-02'
            }
        ];

        let repos = JSON.parse(localStorage.getItem('ezgit-repos') || JSON.stringify(sampleRepos));
        let currentCategory = 'all';
        let currentView = localStorage.getItem('ezgit-view') || 'grid';

        // 加载自定义分类
        let customCategories = JSON.parse(localStorage.getItem('ezgit-categories') || '{}');
        
        const defaultCategoryNames = {
            tools: '效率工具',
            learning: '学习资源',
            inspiration: '参考灵感',
            infrastructure: '基础建设'
        };
        
        // 合并默认和自定义分类
        let categoryNames = { ...defaultCategoryNames, ...customCategories };

        // DOM 元素
        const repoList = document.getElementById('repo-list');
        const emptyState = document.getElementById('empty-state');
        const addModal = document.getElementById('add-modal');
        const toast = document.getElementById('toast');

        // 渲染分类筛选按钮
        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');
            const addBtn = document.getElementById('add-category-btn');
            
            // 清除现有分类按钮（保留"全部"和添加按钮）
            container.querySelectorAll('.filter-btn:not([data-category="all"])').forEach(btn => btn.remove());
            
            // 添加所有分类按钮
            Object.entries(categoryNames).forEach(([key, name]) => {
                const btn = document.createElement('button');
                btn.className = `filter-btn px-4 py-2 rounded-full text-sm font-medium transition border ${currentCategory === key ? 'bg-green-600 text-white border-green-600' : 'bg-white text-gray-600 border-gray-200'}`;
                btn.dataset.category = key;
                btn.innerHTML = `<i class="fas fa-tag mr-1"></i> ${name}`;
                btn.onclick = () => filterByCategory(key);
                container.insertBefore(btn, addBtn);
            });
        }

        // 更新分类下拉框
        function updateCategorySelect() {
            const select = document.getElementById('repo-category');
            const currentValue = select.value;
            
            // 保留第一个option，重新生成其他选项
            select.innerHTML = '<option value="">选择分类...</option>';
            
            Object.entries(categoryNames).forEach(([key, name]) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = name;
                select.appendChild(option);
            });
            
            // 添加"+ 添加自定义分类"选项
            const addOption = document.createElement('option');
            addOption.value = '__add_new__';
            addOption.textContent = '+ 添加自定义分类';
            select.appendChild(addOption);
            
            select.value = currentValue;
        }

        // 添加自定义分类
        function addCustomCategory() {
            const input = document.getElementById('new-category-name');
            const name = input.value.trim();
            
            if (!name) {
                showToast('请输入分类名称');
                return;
            }
            
            // 生成唯一key
            const key = 'custom_' + Date.now();
            customCategories[key] = name;
            categoryNames[key] = name;
            
            // 保存到localStorage
            localStorage.setItem('ezgit-categories', JSON.stringify(customCategories));
            
            // 更新UI
            renderCategoryFilters();
            updateCategorySelect();
            
            // 选中新添加的分类
            document.getElementById('repo-category').value = key;
            
            // 隐藏输入框
            document.getElementById('custom-category-input').classList.add('hidden');
            input.value = '';
            
            showToast('分类已添加');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('total-count').textContent = repos.length;
            const categories = new Set(repos.map(r => r.category).filter(Boolean));
            document.getElementById('category-count').textContent = categories.size;
            document.getElementById('starred-count').textContent = repos.filter(r => r.starred).length;
        }

        // 渲染
        function render() {
            let filtered = repos;
            if (currentCategory !== 'all') {
                filtered = repos.filter(r => r.category === currentCategory);
            }
            
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) ||
                    r.owner.toLowerCase().includes(searchTerm) ||
                    (r.title || '').toLowerCase().includes(searchTerm)
                );
            }
            
            if (filtered.length === 0) {
                repoList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            if (currentView === 'grid') {
                repoList.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4';
            } else {
                repoList.className = 'flex flex-col gap-3';
            }
            
            repoList.innerHTML = filtered.map(r => {
                if (currentView === 'grid') {
                    return `
                        <div class="repo-card bg-white p-4 rounded-xl shadow-sm border">
                            <div class="flex items-start gap-3">
                                <img src="https://github.com/${r.owner}.png" class="w-10 h-10 rounded-lg" onerror="this.src='https://github.com/github.png'">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${categoryNames[r.category] || r.category}</span>
                                        ${r.starred ? '<i class="fas fa-star text-yellow-400"></i>' : ''}
                                    </div>
                                    <a href="${r.url}" target="_blank" class="font-medium text-gray-900 hover:text-green-600 truncate block">${r.owner}/${r.name}</a>
                                    ${r.description ? `<p class="text-xs text-gray-500 mt-1 truncate">${r.description}</p>` : ''}
                                    ${r.title ? `<p class="text-sm text-gray-600 mt-2 line-clamp-2">${r.title}</p>` : ''}
                                    <div class="flex items-center gap-3 mt-3 text-xs text-gray-400">
                                        ${r.language ? `<span><i class="fas fa-code mr-1"></i>${r.language}</span>` : ''}
                                        ${r.stars ? `<span><i class="fas fa-star text-yellow-400 mr-1"></i>${r.stars}</span>` : ''}
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-2 mt-3 pt-3 border-t justify-end">
                                <button onclick="window.editRepo('${r.id}')" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded transition" title="编辑">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button onclick="window.toggleStar('${r.id}')" class="w-8 h-8 flex items-center justify-center ${r.starred ? 'text-yellow-500' : 'text-gray-400'} hover:text-yellow-500 hover:bg-yellow-50 rounded transition" title="${r.starred ? '取消精选' : '精选'}">
                                    <i class="${r.starred ? 'fas' : 'far'} fa-star text-xs"></i>
                                </button>
                                <button onclick="window.deleteRepo('${r.id}')" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition" title="删除">
                                    <i class="fas fa-trash text-xs"></i>
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="repo-card bg-white p-4 rounded-xl shadow-sm border flex items-center gap-4">
                            <img src="https://github.com/${r.owner}.png" class="w-10 h-10 rounded-lg" onerror="this.src='https://github.com/github.png'">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2">
                                    <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${categoryNames[r.category] || r.category}</span>
                                    ${r.starred ? '<i class="fas fa-star text-yellow-400"></i>' : ''}
                                    <a href="${r.url}" target="_blank" class="font-medium text-gray-900 hover:text-green-600 truncate">${r.owner}/${r.name}</a>
                                </div>
                                ${r.title ? `<p class="text-sm text-gray-600 mt-1">${r.title}</p>` : ''}
                            </div>
                            <div class="flex items-center gap-1">
                                ${r.language ? `<span class="text-xs text-gray-400 mr-2"><i class="fas fa-code mr-1"></i>${r.language}</span>` : ''}
                                <button onclick="window.editRepo('${r.id}')" class="w-8 h-8 flex items-center justify-center text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded transition" title="编辑">
                                    <i class="fas fa-pen text-xs"></i>
                                </button>
                                <button onclick="window.toggleStar('${r.id}')" class="w-8 h-8 flex items-center justify-center ${r.starred ? 'text-yellow-500' : 'text-gray-400'} hover:text-yellow-500 hover:bg-yellow-50 rounded transition" title="${r.starred ? '取消精选' : '精选'}">
                                    <i class="${r.starred ? 'fas' : 'far'} fa-star text-xs"></i>
                                </button>
                                <button onclick="window.deleteRepo('${r.id}')" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded transition" title="删除">
                                    <i class="fas fa-trash text-xs"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        // 保存
        function saveRepos() {
            localStorage.setItem('ezgit-repos', JSON.stringify(repos));
        }

        // 显示提示
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2000);
        }

        // 添加仓库
        function addRepo() {
            const url = document.getElementById('repo-url').value.trim();
            const category = document.getElementById('repo-category').value;
            const title = document.getElementById('repo-title').value.trim();
            const notes = document.getElementById('repo-notes').value.trim();
            const starred = document.getElementById('repo-starred').checked;
            
            if (!url || !category) {
                showToast('请填写 URL 和分类');
                return;
            }
            
            const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (!match) {
                showToast('无效的 GitHub URL');
                return;
            }
            
            repos.unshift({
                id: Date.now().toString(),
                url: url.replace(/\.git$/, ''),
                owner: match[1],
                name: match[2].replace(/\.git$/, ''),
                description: document.getElementById('preview-desc').textContent || '',
                language: document.getElementById('preview-lang').textContent || '',
                stars: document.getElementById('preview-stars').textContent || '',
                category,
                title,
                notes,
                starred,
                addedAt: new Date().toISOString()
            });
            
            saveRepos();
            updateStats();
            render();
            addModal.classList.add('hidden');
            showToast('仓库已添加');
            
            // 清空表单
            document.getElementById('repo-url').value = '';
            document.getElementById('repo-category').value = '';
            document.getElementById('repo-title').value = '';
            document.getElementById('repo-notes').value = '';
            document.getElementById('repo-starred').checked = false;
            document.getElementById('repo-preview').classList.add('hidden');
        }

        // 获取仓库信息
        async function fetchRepoInfo() {
            const url = document.getElementById('repo-url').value.trim();
            if (!url) return;
            
            const match = url.match(/github\.com\/([^\/]+)\/([^\/]+)/);
            if (!match) return;
            
            const [, owner, name] = match;
            
            // 简单模拟，实际可调用 GitHub API
            document.getElementById('preview-avatar').src = `https://github.com/${owner}.png`;
            document.getElementById('preview-name').textContent = `${owner}/${name.replace(/\.git$/, '')}`;
            document.getElementById('preview-desc').textContent = '点击添加后自动获取详细信息';
            document.getElementById('preview-stars').textContent = '-';
            document.getElementById('preview-lang').textContent = '-';
            document.getElementById('repo-preview').classList.remove('hidden');
        }

        // 编辑仓库
        function editRepo(id) {
            const repo = repos.find(r => r.id === id);
            if (!repo) return;
            
            document.getElementById('repo-url').value = repo.url;
            document.getElementById('repo-category').value = repo.category;
            document.getElementById('repo-title').value = repo.title || '';
            document.getElementById('repo-notes').value = repo.notes || '';
            document.getElementById('repo-starred').checked = repo.starred;
            
            fetchRepoInfo();
            addModal.classList.remove('hidden');
            
            // 修改保存按钮行为为更新
            const saveBtn = document.getElementById('save-btn');
            saveBtn.textContent = '更新';
            saveBtn.onclick = () => {
                repo.category = document.getElementById('repo-category').value;
                repo.title = document.getElementById('repo-title').value.trim();
                repo.notes = document.getElementById('repo-notes').value.trim();
                repo.starred = document.getElementById('repo-starred').checked;
                
                saveRepos();
                updateStats();
                render();
                addModal.classList.add('hidden');
                showToast('已更新');
                
                // 恢复添加模式
                saveBtn.textContent = '添加';
                saveBtn.onclick = addRepo;
                resetForm();
            };
        }

        // 切换精选
        function toggleStar(id) {
            const repo = repos.find(r => r.id === id);
            if (!repo) return;
            
            repo.starred = !repo.starred;
            saveRepos();
            updateStats();
            render();
            showToast(repo.starred ? '已标记为精选' : '已取消精选');
        }

        // 删除仓库
        function deleteRepo(id) {
            if (!confirm('确定要删除这个仓库吗？')) return;
            
            repos = repos.filter(r => r.id !== id);
            saveRepos();
            updateStats();
            render();
            showToast('已删除');
        }

        // 重置表单
        function resetForm() {
            document.getElementById('repo-url').value = '';
            document.getElementById('repo-category').value = '';
            document.getElementById('repo-title').value = '';
            document.getElementById('repo-notes').value = '';
            document.getElementById('repo-starred').checked = false;
            document.getElementById('repo-preview').classList.add('hidden');
            document.getElementById('custom-category-input').classList.add('hidden');
            document.getElementById('new-category-name').value = '';
        }

        // 导出数据
        function exportData() {
            const blob = new Blob([JSON.stringify(repos, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ezgit-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('数据已导出');
        }

        // 导入数据
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        repos = [...data, ...repos];
                        saveRepos();
                        updateStats();
                        render();
                        showToast(`导入了 ${data.length} 个仓库`);
                    }
                } catch {
                    showToast('导入失败');
                }
            };
            reader.readAsText(file);
        }

        // 搜索
        function searchRepos() {
            render();
        }

        // 筛选分类
        function filterByCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.classList.remove('bg-white', 'text-gray-600', 'border');
                    btn.classList.add('bg-green-600', 'text-white');
                } else {
                    btn.classList.add('bg-white', 'text-gray-600', 'border');
                    btn.classList.remove('bg-green-600', 'text-white');
                }
            });
            
            render();
        }

        // 切换视图
        function toggleView(view) {
            currentView = view;
            localStorage.setItem('ezgit-view', view);
            
            const gridBtn = document.getElementById('view-grid');
            const listBtn = document.getElementById('view-list');
            
            if (view === 'grid') {
                gridBtn.classList.add('bg-white', 'shadow');
                gridBtn.classList.remove('text-gray-500');
                listBtn.classList.remove('bg-white', 'shadow');
                listBtn.classList.add('text-gray-500');
            } else {
                listBtn.classList.add('bg-white', 'shadow');
                listBtn.classList.remove('text-gray-500');
                gridBtn.classList.remove('bg-white', 'shadow');
                gridBtn.classList.add('text-gray-500');
            }
            
            render();
        }

        // 显示/隐藏模态框
        function showAddModal() {
            addModal.classList.remove('hidden');
            document.getElementById('save-btn').textContent = '添加';
            document.getElementById('save-btn').onclick = addRepo;
            resetForm();
        }

        function hideAddModal() {
            addModal.classList.add('hidden');
            resetForm();
        }

        // 暴露全局函数（供内联事件调用）
        window.editRepo = editRepo;
        window.toggleStar = toggleStar;
        window.deleteRepo = deleteRepo;
        window.fetchRepoInfo = fetchRepoInfo;

        // 事件绑定
        document.getElementById('add-btn').addEventListener('click', showAddModal);
        document.getElementById('close-modal').addEventListener('click', hideAddModal);
        document.getElementById('cancel-btn').addEventListener('click', hideAddModal);
        document.getElementById('save-btn').addEventListener('click', addRepo);
        document.getElementById('fetch-btn').addEventListener('click', fetchRepoInfo);
        document.getElementById('export-btn').addEventListener('click', exportData);
        document.getElementById('import-file').addEventListener('change', (e) => {
            if (e.target.files[0]) importData(e.target.files[0]);
        });
        document.getElementById('search-input').addEventListener('input', searchRepos);

        // 分类筛选事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => filterByCategory(btn.dataset.category));
        });

        // 视图切换事件
        document.getElementById('view-grid').addEventListener('click', () => toggleView('grid'));
        document.getElementById('view-list').addEventListener('click', () => toggleView('list'));

        // 分类下拉框选择事件
        document.getElementById('repo-category').addEventListener('change', (e) => {
            if (e.target.value === '__add_new__') {
                document.getElementById('custom-category-input').classList.remove('hidden');
                document.getElementById('new-category-name').focus();
                e.target.value = '';
            }
        });

        // 添加分类按钮事件
        document.getElementById('add-category-btn').addEventListener('click', () => {
            addModal.classList.remove('hidden');
            document.getElementById('custom-category-input').classList.remove('hidden');
            document.getElementById('new-category-name').focus();
        });

        document.getElementById('save-category-btn').addEventListener('click', addCustomCategory);
        document.getElementById('cancel-category-btn').addEventListener('click', () => {
            document.getElementById('custom-category-input').classList.add('hidden');
            document.getElementById('new-category-name').value = '';
        });

        // 点击遮罩关闭
        addModal.addEventListener('click', (e) => {
            if (e.target === addModal) hideAddModal();
        });

        // 初始化
        renderCategoryFilters();
        updateCategorySelect();
        updateStats();
        toggleView(currentView);
        render();
    </script>
</body>
</html>
